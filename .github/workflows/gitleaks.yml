name: Gitleaks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    name: Detect committed secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/
          gitleaks version

      - name: Scan working tree + git history
        run: |
          gitleaks detect \
            --no-banner \
            --redact \
            --config .gitleaks.toml \
            --source . \
            --log-level info
