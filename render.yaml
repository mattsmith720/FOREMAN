# Deploy the Foreman API to Render (free tier).
# The web client deploys separately to Vercel — see DEPLOY.md.
#
# Connect this repo in Render → New → Blueprint → select render.yaml,
# or New → Web Service with root = repo root and these commands.

services:
  - type: web
    name: foreman-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build:shared && npm run build --workspace backend
    startCommand: npm run start --workspace backend
    # /health = liveness (process up). /ready = feature availability (keys configured).
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        # claude-sonnet-4-20250514 is deprecated (EOL 2026-06-15). Verify this
        # value is applied on the Render dashboard — a running service does not
        # always pick up blueprint env changes automatically.
        value: claude-sonnet-4-6
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FOREMAN_API_KEY
        sync: false
      - key: SESSION_TOKEN_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: https://foreman-phi.vercel.app,https://foreman.unicityai.com.au,https://go.unicityai.com.au
      - key: INGEST_WEBHOOK_SECRET
        sync: false
      - key: OPS_PASSWORD
        sync: false
      - key: INGEST_FRAME_INTERVAL_SEC
        value: "10"
      - key: INGEST_MAX_FRAMES
        value: "60"
      - key: INGEST_ANALYSE_FRAMES
        value: "false"
      - key: AUDIO_PERSIST
        value: "false"
      - key: ANTHROPIC_MAX_TOKENS
        # 512/1024 truncate claude-sonnet-4-6's JSON -> empty fallback coaching.
        # Verify on the Render dashboard (blueprint env may not auto-apply).
        value: "1500"
