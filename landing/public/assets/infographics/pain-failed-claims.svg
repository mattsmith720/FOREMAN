<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none" role="img" aria-label="Owner on every roof — training bottleneck">
  <rect width="800" height="800" fill="#0d1117"/>
  <rect width="800" height="4" fill="#22d3ee"/>
  <text x="400" y="96" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="36" font-weight="700">Owner on Every Roof</text>

  <!-- Roof -->
  <path d="M120 520 L400 300 L680 520 Z" fill="#161f2c" stroke="#e2e8f0" stroke-width="2.5"/>
  <rect x="220" y="520" width="360" height="180" fill="#111820" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Owner figure (hi-vis) -->
  <circle cx="320" cy="420" r="36" fill="#64748b" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="288" y="456" width="64" height="90" rx="8" fill="#94a3b8" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="276" y="470" width="20" height="50" rx="4" fill="#94a3b8" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="364" y="470" width="20" height="50" rx="4" fill="#94a3b8" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- New hire shadow -->
  <circle cx="480" cy="440" r="30" fill="#161f2c" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="6 4"/>
  <rect x="456" y="470" width="48" height="72" rx="8" fill="#161f2c" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="480" y="580" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="18">New hire</text>

  <!-- Repeat loop -->
  <path d="M520 360a80 80 0 1 1-160 0" fill="none" stroke="#dc2626" stroke-width="3"/>
  <polygon points="360,360 372,348 372,372" fill="#dc2626"/>
  <text x="400" y="330" text-anchor="middle" fill="#dc2626" font-family="system-ui" font-size="20" font-weight="700">Repeat every visit</text>

  <text x="400" y="700" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="22">Same scrub, mesh, and thermal steps — weeks of shadowing</text>
</svg>
