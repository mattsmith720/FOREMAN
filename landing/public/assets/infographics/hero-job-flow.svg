<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" fill="none" role="img" aria-label="Foreman maintenance job flow from consent to training module">
  <rect width="1600" height="1000" fill="#0d1117"/>
  <rect width="1600" height="4" fill="#22d3ee"/>
  <text x="80" y="88" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="28" font-weight="700" letter-spacing="0.14em">MAINTENANCE JOB FLOW</text>
  <text x="80" y="138" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="34">Record once · coach live · onboard the next hire</text>

  <!-- Step 1 -->
  <rect x="80" y="200" width="320" height="220" rx="14" fill="#111820" stroke="#e2e8f0" stroke-width="2" stroke-opacity="0.12"/>
  <circle cx="130" cy="260" r="28" fill="#22d3ee" fill-opacity="0.2" stroke="#22d3ee" stroke-width="2"/>
  <text x="130" y="268" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="22" font-weight="700">1</text>
  <rect x="180" y="238" width="56" height="88" rx="10" stroke="#e2e8f0" stroke-width="2"/>
  <circle cx="208" cy="258" r="6" fill="#e2e8f0"/>
  <path d="M196 310h24" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
  <text x="110" y="360" fill="#e2e8f0" font-family="system-ui" font-size="26" font-weight="700">Start job</text>
  <text x="110" y="395" fill="#94a3b8" font-family="system-ui" font-size="20">Consent · pick job type</text>

  <path d="M420 310h80" stroke="#22d3ee" stroke-width="3"/>
  <polygon points="500,310 488,302 488,318" fill="#22d3ee"/>

  <!-- Step 2 -->
  <rect x="520" y="200" width="320" height="220" rx="14" fill="#111820" stroke="#e2e8f0" stroke-width="2" stroke-opacity="0.12"/>
  <circle cx="570" cy="260" r="28" fill="#161f2c" stroke="#e2e8f0" stroke-width="2" stroke-opacity="0.2"/>
  <text x="570" y="268" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="22" font-weight="700">2</text>
  <path d="M620 290l80-40 80 40v70H620z" fill="#161f2c" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="650" y="318" width="36" height="48" fill="#64748b" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="700" y="300" width="28" height="18" rx="3" fill="#e2e8f0" fill-opacity="0.15"/>
  <text x="550" y="360" fill="#e2e8f0" font-family="system-ui" font-size="26" font-weight="700">Record visit</text>
  <text x="550" y="395" fill="#94a3b8" font-family="system-ui" font-size="20">Phone camera + mic on roof</text>

  <path d="M860 310h80" stroke="#e2e8f0" stroke-width="2" stroke-opacity="0.25"/>
  <polygon points="940,310 928,302 928,318" fill="#e2e8f0" fill-opacity="0.35"/>

  <!-- Step 3 -->
  <rect x="960" y="200" width="320" height="220" rx="14" fill="#111820" stroke="#e2e8f0" stroke-width="2" stroke-opacity="0.12"/>
  <circle cx="1010" cy="260" r="28" fill="#161f2c" stroke="#e2e8f0" stroke-width="2" stroke-opacity="0.2"/>
  <text x="1010" y="268" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="22" font-weight="700">3</text>
  <rect x="1050" y="248" width="200" height="56" rx="28" fill="#111820" stroke="#e2e8f0" stroke-width="2"/>
  <path d="M1068 276h8v-8l12 12-12 12v-8h-8" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1090" y="282" fill="#e2e8f0" font-family="system-ui" font-size="17" font-weight="600">Missed lower-row rinse</text>
  <text x="990" y="360" fill="#e2e8f0" font-family="system-ui" font-size="26" font-weight="700">Live coaching</text>
  <text x="990" y="395" fill="#94a3b8" font-family="system-ui" font-size="20">One spoken cue on site</text>

  <path d="M1300 310h80" stroke="#e2e8f0" stroke-width="2" stroke-opacity="0.25"/>
  <polygon points="1380,310 1368,302 1368,318" fill="#e2e8f0" fill-opacity="0.35"/>

  <!-- Step 4 -->
  <rect x="1400" y="200" width="120" height="220" rx="14" fill="#22d3ee"/>
  <text x="1460" y="280" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="48" font-weight="700">4</text>
  <path d="M1430 330l30 24 30-24" fill="none" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="80" y="520" fill="#e2e8f0" font-family="system-ui" font-size="26" font-weight="700">Training module ready</text>

  <!-- Bottom panel -->
  <rect x="80" y="560" width="1440" height="360" rx="16" fill="#111820" stroke="#e2e8f0" stroke-width="2" stroke-opacity="0.1"/>
  <text x="120" y="630" fill="#e2e8f0" font-family="system-ui" font-size="24" font-weight="700">Auto onboarding package</text>
  <text x="120" y="670" fill="#94a3b8" font-family="system-ui" font-size="20">Steps · safety notes · quiz · briefing script</text>

  <rect x="120" y="710" width="260" height="140" rx="10" fill="#0d1117" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.1"/>
  <text x="150" y="760" fill="#e2e8f0" font-family="system-ui" font-size="18" font-weight="600">Panel clean</text>
  <text x="150" y="790" fill="#94a3b8" font-family="system-ui" font-size="16">6 steps</text>
  <circle cx="340" cy="750" r="14" fill="#0e9b8a"/>
  <path d="M333 750l5 5 10-12" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>

  <rect x="420" y="710" width="260" height="140" rx="10" fill="#0d1117" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.1"/>
  <text x="450" y="760" fill="#e2e8f0" font-family="system-ui" font-size="18" font-weight="600">Pigeon proofing</text>
  <text x="450" y="790" fill="#94a3b8" font-family="system-ui" font-size="16">8 steps</text>

  <rect x="720" y="710" width="260" height="140" rx="10" fill="#0d1117" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.1"/>
  <text x="750" y="760" fill="#e2e8f0" font-family="system-ui" font-size="18" font-weight="600">Thermal scan</text>
  <text x="750" y="790" fill="#94a3b8" font-family="system-ui" font-size="16">5 steps</text>

  <rect x="1020" y="710" width="460" height="140" rx="10" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.08"/>
  <text x="1050" y="760" fill="#e2e8f0" font-family="system-ui" font-size="18" font-weight="600">Private dataset grows every visit</text>
  <text x="1050" y="800" fill="#94a3b8" font-family="system-ui" font-size="16">Frames · audio · transcripts · labels → export for your model</text>
</svg>
