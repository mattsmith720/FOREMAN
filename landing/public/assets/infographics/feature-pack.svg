<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none" role="img" aria-label="Auto-generated onboarding module from a completed job">
  <rect width="1200" height="800" fill="#0d1117"/>
  <rect width="1200" height="4" fill="#22d3ee"/>
  <text x="60" y="72" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="32" font-weight="700">Auto Training Modules</text>
  <text x="60" y="112" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="22">Onboarding packages from your best techs</text>

  <!-- Job complete → module -->
  <rect x="60" y="180" width="280" height="520" rx="16" fill="#111820" stroke="#e2e8f0" stroke-width="2" stroke-opacity="0.1"/>
  <text x="90" y="240" fill="#e2e8f0" font-family="system-ui" font-size="20" font-weight="700">Job complete</text>
  <rect x="90" y="270" width="220" height="120" rx="8" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.12"/>
  <text x="110" y="320" fill="#94a3b8" font-family="system-ui" font-size="16">47 frames</text>
  <text x="110" y="350" fill="#94a3b8" font-family="system-ui" font-size="16">12 coaching cues</text>
  <text x="110" y="380" fill="#94a3b8" font-family="system-ui" font-size="16">8 min transcript</text>

  <path d="M200 430h80" stroke="#22d3ee" stroke-width="4"/>
  <polygon points="280,430 268,422 268,438" fill="#22d3ee"/>

  <rect x="90" y="460" width="220" height="200" rx="10" fill="#22d3ee" fill-opacity="0.2" stroke="#22d3ee" stroke-width="2"/>
  <text x="200" y="530" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="18" font-weight="700">Generate module</text>
  <text x="200" y="560" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="15">from session data</text>

  <!-- Module output -->
  <rect x="400" y="180" width="740" height="520" rx="16" fill="#111820" stroke="#e2e8f0" stroke-width="2" stroke-opacity="0.1"/>
  <text x="440" y="240" fill="#e2e8f0" font-family="system-ui" font-size="24" font-weight="700">Panel clean · commercial array</text>
  <text x="440" y="280" fill="#94a3b8" font-family="system-ui" font-size="18">Learning objectives</text>

  <circle cx="460" cy="320" r="6" fill="#0e9b8a"/>
  <text x="480" y="326" fill="#e2e8f0" font-family="system-ui" font-size="17">Safe ladder placement on tile roof</text>
  <circle cx="460" cy="360" r="6" fill="#0e9b8a"/>
  <text x="480" y="366" fill="#e2e8f0" font-family="system-ui" font-size="17">Debris-Block application on lower edge</text>
  <circle cx="460" cy="400" r="6" fill="#0e9b8a"/>
  <text x="480" y="406" fill="#e2e8f0" font-family="system-ui" font-size="17">Before/after photo for customer handover</text>

  <text x="440" y="460" fill="#e2e8f0" font-family="system-ui" font-size="20" font-weight="700">Steps</text>
  <rect x="440" y="480" width="640" height="48" rx="8" fill="#0d1117"/>
  <text x="460" y="512" fill="#e2e8f0" font-family="system-ui" font-size="16">1 · Set exclusion zone · harness anchor check</text>
  <rect x="440" y="540" width="640" height="48" rx="8" fill="#0d1117"/>
  <text x="460" y="572" fill="#e2e8f0" font-family="system-ui" font-size="16">2 · Pre-rinse upper rows before scrub</text>
  <rect x="440" y="600" width="640" height="48" rx="8" fill="#0d1117"/>
  <text x="460" y="632" fill="#e2e8f0" font-family="system-ui" font-size="16">3 · Quiz: when to apply Debris-Block</text>

  <text x="60" y="760" fill="#94a3b8" font-family="system-ui" font-size="20">Real visits · not generic slides</text>
</svg>
