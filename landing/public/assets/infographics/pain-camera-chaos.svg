<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none" role="img" aria-label="Inconsistent crew quality across five techs">
  <rect width="800" height="800" fill="#0d1117"/>
  <rect width="800" height="4" fill="#22d3ee"/>
  <text x="400" y="96" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="34" font-weight="700">Inconsistent Crew Quality</text>

  <!-- Five technique bars -->
  <text x="120" y="180" fill="#94a3b8" font-family="system-ui" font-size="18">Tech A</text>
  <rect x="220" y="160" width="480" height="28" rx="6" fill="#111820" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.12"/>
  <rect x="220" y="160" width="420" height="28" rx="6" fill="#0e9b8a" fill-opacity="0.55"/>

  <text x="120" y="250" fill="#94a3b8" font-family="system-ui" font-size="18">Tech B</text>
  <rect x="220" y="230" width="480" height="28" rx="6" fill="#111820" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.12"/>
  <rect x="220" y="230" width="280" height="28" rx="6" fill="#22d3ee" fill-opacity="0.7"/>

  <text x="120" y="320" fill="#94a3b8" font-family="system-ui" font-size="18">Tech C</text>
  <rect x="220" y="300" width="480" height="28" rx="6" fill="#111820" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.12"/>
  <rect x="220" y="300" width="360" height="28" rx="6" fill="#94a3b8" fill-opacity="0.25"/>

  <text x="120" y="390" fill="#94a3b8" font-family="system-ui" font-size="18">Tech D</text>
  <rect x="220" y="370" width="480" height="28" rx="6" fill="#111820" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.12"/>
  <rect x="220" y="370" width="200" height="28" rx="6" fill="#dc2626" fill-opacity="0.45"/>

  <text x="120" y="460" fill="#94a3b8" font-family="system-ui" font-size="18">Tech E</text>
  <rect x="220" y="440" width="480" height="28" rx="6" fill="#111820" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.12"/>
  <rect x="220" y="440" width="320" height="28" rx="6" fill="#94a3b8" fill-opacity="0.2"/>

  <!-- Panel icons showing different quality -->
  <rect x="140" y="540" width="520" height="160" rx="12" fill="#111820" stroke="#e2e8f0" stroke-width="2" stroke-opacity="0.1"/>
  <rect x="170" y="580" width="80" height="50" rx="4" fill="#0e9b8a" fill-opacity="0.3" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="270" y="580" width="80" height="50" rx="4" fill="#22d3ee" fill-opacity="0.35" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="370" y="580" width="80" height="50" rx="4" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="470" y="580" width="80" height="50" rx="4" fill="#dc2626" fill-opacity="0.2" stroke="#dc2626" stroke-width="2"/>
  <text x="510" y="612" text-anchor="middle" fill="#dc2626" font-family="system-ui" font-size="28" font-weight="700">✗</text>
  <rect x="570" y="580" width="80" height="50" rx="4" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="4 3"/>

  <text x="400" y="720" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="22">Five techs · five techniques · callbacks when the standard slips</text>
</svg>
