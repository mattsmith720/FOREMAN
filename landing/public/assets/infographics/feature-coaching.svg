<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none" role="img" aria-label="Live technique and safety coaching on the roof">
  <rect width="1200" height="800" fill="#0d1117"/>
  <rect width="1200" height="4" fill="#22d3ee"/>
  <text x="60" y="72" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="32" font-weight="700">Live Technique Coaching</text>
  <text x="60" y="112" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="22">One spoken line while the ladder is still up</text>

  <!-- Solar panel array schematic -->
  <rect x="80" y="180" width="520" height="520" rx="16" fill="#111820" stroke="#e2e8f0" stroke-width="2" stroke-opacity="0.1"/>
  <rect x="120" y="240" width="100" height="70" rx="4" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="240" y="240" width="100" height="70" rx="4" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="360" y="240" width="100" height="70" rx="4" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="480" y="240" width="80" height="70" rx="4" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5"/>

  <rect x="120" y="330" width="100" height="70" rx="4" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="240" y="330" width="100" height="70" rx="4" fill="#dc2626" fill-opacity="0.15" stroke="#dc2626" stroke-width="2.5"/>
  <rect x="360" y="330" width="100" height="70" rx="4" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="480" y="330" width="80" height="70" rx="4" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5"/>

  <rect x="120" y="420" width="100" height="70" rx="4" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="240" y="420" width="100" height="70" rx="4" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="360" y="420" width="100" height="70" rx="4" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5"/>

  <text x="290" y="375" text-anchor="middle" fill="#dc2626" font-family="system-ui" font-size="14" font-weight="700">Lower row missed</text>

  <!-- Speech bubble -->
  <rect x="640" y="280" width="480" height="120" rx="60" fill="#111820" stroke="#e2e8f0" stroke-width="2.5"/>
  <path d="M640 360 L580 420 L680 380 Z" fill="#111820" stroke="#e2e8f0" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M668 380 L580 420" stroke="#22d3ee" stroke-width="4"/>
  <text x="680" y="340" fill="#e2e8f0" font-family="system-ui" font-size="24" font-weight="700">Rinse the lower row</text>
  <text x="680" y="375" fill="#94a3b8" font-family="system-ui" font-size="20">before you move the ladder</text>

  <!-- Other cue examples -->
  <rect x="640" y="460" width="440" height="64" rx="10" fill="#0d1117" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.1"/>
  <text x="670" y="500" fill="#94a3b8" font-family="system-ui" font-size="18">Mesh gap at the corner</text>

  <rect x="640" y="540" width="440" height="64" rx="10" fill="#0d1117" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.1"/>
  <text x="670" y="580" fill="#94a3b8" font-family="system-ui" font-size="18">Thermal angle off — rescan this string</text>

  <text x="60" y="760" fill="#94a3b8" font-family="system-ui" font-size="20">Flagged on site · not on the callback visit</text>
</svg>
