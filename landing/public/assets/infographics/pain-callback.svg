<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none" role="img" aria-label="Franchise scale stalls due to training bottleneck">
  <rect width="800" height="800" fill="#0d1117"/>
  <rect width="800" height="4" fill="#22d3ee"/>
  <text x="400" y="96" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="34" font-weight="700">Franchise Scale Stalls</text>

  <!-- Growth chart that flattens -->
  <rect x="100" y="160" width="600" height="380" rx="14" fill="#111820" stroke="#e2e8f0" stroke-width="2" stroke-opacity="0.1"/>
  <line x1="160" y1="480" x2="640" y2="480" stroke="#e2e8f0" stroke-width="2" stroke-opacity="0.15"/>
  <line x1="160" y1="220" x2="160" y2="480" stroke="#e2e8f0" stroke-width="2" stroke-opacity="0.15"/>

  <text x="180" y="250" fill="#94a3b8" font-family="system-ui" font-size="16">Jobs</text>
  <path d="M180 420 L280 380 L380 340 L480 330 L580 328 L640 327" fill="none" stroke="#0e9b8a" stroke-width="4" stroke-linecap="round"/>
  <path d="M180 460 L280 450 L380 445 L480 444 L580 443 L640 442" fill="none" stroke="#22d3ee" stroke-width="4" stroke-linecap="round"/>

  <text x="300" y="520" fill="#0e9b8a" font-family="system-ui" font-size="16" font-weight="600">Demand ↑</text>
  <text x="480" y="520" fill="#22d3ee" font-family="system-ui" font-size="16" font-weight="600">Owner training hours ↑↑</text>

  <!-- Bottleneck -->
  <rect x="520" y="300" width="140" height="100" rx="10" fill="#dc2626" fill-opacity="0.12" stroke="#dc2626" stroke-width="2"/>
  <text x="590" y="345" text-anchor="middle" fill="#dc2626" font-family="system-ui" font-size="18" font-weight="700">You</text>
  <text x="590" y="375" text-anchor="middle" fill="#dc2626" font-family="system-ui" font-size="15">on every roof</text>

  <text x="400" y="620" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="24" font-weight="600">Growth adds training load — not less</text>
  <text x="400" y="670" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="20">You cannot clone yourself across every new hire</text>
  <text x="400" y="720" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="18">Franchise expansion hits a training ceiling</text>
</svg>
