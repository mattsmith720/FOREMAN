<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none" role="img" aria-label="Footage sits in camera rolls unused">
  <rect width="800" height="800" fill="#0d1117"/>
  <rect width="800" height="4" fill="#22d3ee"/>
  <text x="400" y="96" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="34" font-weight="700">Footage Goes Nowhere</text>

  <!-- Camera roll grid -->
  <rect x="100" y="150" width="600" height="420" rx="16" fill="#111820" stroke="#e2e8f0" stroke-width="2" stroke-opacity="0.12"/>
  <text x="130" y="200" fill="#94a3b8" font-family="system-ui" font-size="18" font-weight="600">Camera roll</text>

  <rect x="130" y="230" width="110" height="80" rx="6" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.15"/>
  <rect x="260" y="230" width="110" height="80" rx="6" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.15"/>
  <rect x="390" y="230" width="110" height="80" rx="6" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.15"/>
  <rect x="520" y="230" width="110" height="80" rx="6" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.15"/>

  <rect x="130" y="330" width="110" height="80" rx="6" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.15"/>
  <rect x="260" y="330" width="110" height="80" rx="6" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.15"/>
  <rect x="390" y="330" width="110" height="80" rx="6" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.15"/>
  <rect x="520" y="330" width="110" height="80" rx="6" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.15"/>

  <rect x="130" y="430" width="110" height="80" rx="6" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.15"/>
  <rect x="260" y="430" width="110" height="80" rx="6" fill="#161f2c" stroke="#e2e8f0" stroke-width="1.5" stroke-opacity="0.15"/>

  <!-- Dead end arrow -->
  <path d="M450 470h120" stroke="#dc2626" stroke-width="3" stroke-dasharray="8 6"/>
  <polygon points="570,470 558,462 558,478" fill="#dc2626"/>
  <rect x="590" y="430" width="90" height="80" rx="8" fill="#111820" stroke="#dc2626" stroke-width="2.5"/>
  <text x="635" y="478" text-anchor="middle" fill="#dc2626" font-family="system-ui" font-size="36" font-weight="700">?</text>

  <text x="400" y="640" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="24" font-weight="600">No structured training data</text>
  <text x="400" y="680" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="20">Nothing labelled · nothing exported · nothing feeding your model</text>
  <text x="400" y="740" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="18">Phone video dies in the camera roll</text>
</svg>
